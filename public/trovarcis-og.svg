  <text x="400" y="275" font-family="Anybody, sans-serif" font-weight="900" font-size="88" fill="#FAFAFA" letter-spacing="-2.6">Trovarcis</text>
  <text x="400" y="370" font-family="Anybody, sans-serif" font-weight="900" font-size="88" fill="#D4A843" letter-spacing="-2.6">Reach</text>

