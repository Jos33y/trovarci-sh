<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#131316"/>
    </linearGradient>
    <radialGradient id="glow" cx="24%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="288" cy="315" rx="500" ry="400" fill="url(#glow)"/>

  <!-- Subtle dot grid, bottom-right corner texture -->
