    <circle cx="1000" cy="500" r="2"/>
    <circle cx="1040" cy="500" r="2"/>
    <circle cx="1080" cy="500" r="2"/>
    <circle cx="1120" cy="500" r="2"/>
    <circle cx="960" cy="540" r="2"/>
    <circle cx="1000" cy="540" r="2"/>
    <circle cx="1040" cy="540" r="2"/>
    <circle cx="1080" cy="540" r="2"/>
    <circle cx="1120" cy="540" r="2"/>
    <circle cx="960" cy="580" r="2"/>
    <circle cx="1000" cy="580" r="2"/>
    <circle cx="1040" cy="580" r="2"/>
    <circle cx="1080" cy="580" r="2"/>
    <circle cx="1120" cy="580" r="2"/>
  </g>

  <!-- Icon: inverted mark (gold container, dark shield + bolt), scaled to 220x220 at (100, 205) -->
  <g transform="translate(100, 205)">
