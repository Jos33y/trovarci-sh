      <path d="M24 7L11 13.5V24C11 28.5 13 32.5 16 35.5C18.5 38 21.2 39.8 24 41C26.8 39.8 29.5 38 32 35.5C35 32.5 37 28.5 37 24V13.5L24 7Z" fill="none" stroke="#09090B" stroke-width="2" stroke-linejoin="round"/>
